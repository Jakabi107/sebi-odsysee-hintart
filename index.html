<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Responsive Starter</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header class="site-header">
			<h1 class="visually-hidden">Responsive Starter Page</h1>
			<!-- Reset button placed top-right -->
			<button id="reset-btn" class="reset-btn purple-interact" aria-label="Reset app">Reset</button>
		</header>

		<!-- Main app container: place further content here -->
		<main id="app" class="container" role="main" aria-label="Main application container">
			<div class="app-placeholder">
				<section class="content-left">
					<div class="text-block">
						<h2 id="question-title">Welcome</h2>
						<p id="question-text">This is a responsive starter container. Add your content inside the <code>#app</code> element. The layout places text on the left and an image on the right on wider screens.</p>
					</div>
				</section>
				<aside class="image-right" aria-hidden="true">
					<!-- SVG placeholder; background and rounded corners provided by the container via CSS -->
                    <img id="question-image" src="placeholder-image.jpg" alt="Placeholder image" class="placeholder-image" />

				</aside>
			</div>

			<div class="app-input">
				<input class="purple-interact" id="user-input" type="text" placeholder="Type something here..." />
			</div>
		</main>

		<script src="scripts.js" defer></script>
	</body>
</html>
